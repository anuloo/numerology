# Decap + GitHub + Netlify only (no Identity, no Git Gateway, no other hosts)
# -----------------------------------------------------------------------------
# GitHub stores the repo. Netlify hosts the site. Netlify’s *OAuth* feature (not
# Identity) holds your GitHub OAuth secret so /admin can log in.
#
# 1) GitHub → Settings → Developer settings → OAuth Apps → New OAuth App
#    • Authorization callback URL must be exactly: https://api.netlify.com/auth/done
#    • Homepage URL: your live site (e.g. https://YOUR-SITE.netlify.app)
#    • Save Client ID and generate a Client Secret (copy once).
#
# 2) Netlify → your site → Project configuration → Access & security → OAuth
#    → Install provider → GitHub → paste Client ID + Client Secret → Save.
#
# 3) Same Netlify site must be connected to this GitHub repo for deploys.
#
# Docs: https://docs.netlify.com/security/secure-access-to-sites/oauth-provider-tokens/
#
# Optional: edit content/homepage.md on github.com if you skip /admin entirely.
# -----------------------------------------------------------------------------
backend:
  name: github
  repo: anuloo/numerology
  branch: main
  auth_scope: repo
  auth_endpoint: https://api.netlify.com/auth

media_folder: uploads
public_folder: /uploads

local_backend: false

collections:
  - name: pages
    label: Pages
    files:
      - label: Homepage
        name: homepage
        file: content/homepage.md
        format: frontmatter
