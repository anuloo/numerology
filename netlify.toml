# Netlify hosts the site. Decap uses GitHub backend + Netlify OAuth (not Identity).
# GitHub OAuth callback in the GitHub app: https://api.netlify.com/auth/done
[build]
  publish = "."

# Decap loads this over fetch(); explicit type avoids odd MIME defaults.
[[headers]]
  for = "/admin/config.yml"
  [headers.values]
    Content-Type = "text/yaml; charset=utf-8"
